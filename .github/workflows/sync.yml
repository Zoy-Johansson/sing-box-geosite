name: Config Update
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'   # 每天中午12点（北京时间）强制更新

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure rule folder exists
        run: |
          mkdir -p rule
          echo "rule folder ready."

      - name: Ensure adguard folder exists
        run: |
          mkdir -p adguard
          echo "adguard folder ready."

      # ================== 强制清空 rule 文件夹（彻底删除所有旧文件） ==================
      - name: Clean rule folder completely (delete ALL old files)
        run: |
          rm -rf rule/* 2>/dev/null || true
          echo "✅ rule 文件夹已彻底清空，所有旧 .json 和 .srs 已删除"
      # =====================================================================

      - name: "Setup sing-box"
        env:
          SING_BOX_DEB_URL: "https://github.com/SagerNet/sing-box/releases/download/v1.14.0-alpha.2/sing-box_1.14.0-alpha.2_linux_amd64.deb"
        run: |
          set -Eeuo pipefail
          wget -O sing-box.deb $SING_BOX_DEB_URL
          sudo dpkg -i sing-box.deb

      - name: Set up Python3
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyyaml

      - name: Download and convert adguard filter
        run: |
          wget -O adguard/filter.txt https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
          sing-box rule-set convert --type adguard --output adguard/filter.srs adguard/filter.txt

      - name: Run script (generate new rules)
        run: python ../main.py
        working-directory: ./rule/

      - name: Commit and push (强制提交，即使内容不变)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          git add ./rule/*.json 2>/dev/null || true
          git add ./rule/*.srs 2>/dev/null || true
          git add ./adguard/*.srs 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No content changed → 使用 --allow-empty 强制提交每日记录"
            git commit --allow-empty -m "Update rules - $(date '+%Y-%m-%d %H:%M:%S') [daily force commit]"
          else
            git commit -m "Update rules - $(date '+%Y-%m-%d %H:%M:%S')"
          fi
          git push
